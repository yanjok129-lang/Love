<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
overflow:hidden;
padding:20px;
}

.card{
background:rgba(0,0,0,0.25);
padding:25px;
border-radius:20px;
max-width:550px;
z-index:2;
position:relative;
backdrop-filter:blur(8px);
}

/* FOTO */

.photos{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:15px;
flex-wrap:wrap;
}

.photo{
width:85px;
height:85px;
object-fit:cover;
border-radius:15px;
border:3px solid white;
}

/* TEXT */

h1{
font-size:18px;
margin-bottom:12px;
}

p{
font-size:11px;
margin:5px 0;
line-height:1.4;
}

/* BUTTON */

.buttons{
margin-top:20px;
position:relative;
height:90px;
}

button{
padding:8px 14px;
font-size:12px;
border:none;
border-radius:10px;
cursor:pointer;
}

#yes{
background:#4CAF50;
color:white;
}

#no{
background:#ff4d6d;
color:white;
position:absolute;
}

.hidden{
display:none;
}

#result{
margin-top:15px;
font-size:14px;
}

/* HEART ANIMATION */

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

.heart{
position:fixed;
top:-20px;
font-size:18px;
animation:fall 4s linear;
pointer-events:none;
}

</style>
</head>

<body>

<div class="card">

<div class="photos">
  <img src="IMG_20260517_022751.jpg" class="photo">
  <img src="IMG_20260517_022808.jpg" class="photo">
  <img src="IMG_20260517_022841.jpg" class="photo">
</div>
